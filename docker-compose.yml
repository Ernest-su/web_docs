services:
  web-docs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-docs
    user: "${WEB_DOCS_UID:-1000}:${WEB_DOCS_GID:-1000}"
    ports:
      - "${WEB_DOCS_PUBLISHED_PORT:-8090}:8090"
    environment:
      WEB_DOCS_HOST: 0.0.0.0
      WEB_DOCS_PORT: 8090
      WEB_DOCS_TITLE: 在线文档
      WEB_DOCS_GIT_PULL: "${WEB_DOCS_GIT_PULL:-1}"
      WEB_DOCS_GIT_PULL_INTERVAL: "${WEB_DOCS_GIT_PULL_INTERVAL:-300}"
      WEB_DOCS_GIT_PULL_TIMEOUT: "${WEB_DOCS_GIT_PULL_TIMEOUT:-120}"
      WEB_DOCS_GIT_PULL_REMOTE: "${WEB_DOCS_GIT_PULL_REMOTE:-}"
      WEB_DOCS_GIT_PULL_BRANCH: "${WEB_DOCS_GIT_PULL_BRANCH:-}"
      WEB_DOCS_ROOT: /docs
      HOME: /tmp
    volumes:
      - ./:/docs
    restart: unless-stopped
